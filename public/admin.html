<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Data — Admin</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1318; --panel:#161c23; --panel-2:#1e2630;
    --line:#2b3541; --line-bright:#3d4a59;
    --teal:#4fc4b8; --teal-dim:#2b6b64; --teal-ink:#06211d;
    --text:#eaeef2; --text-dim:#8b97a3;
    --good:#5cbf8a; --good-ink:#0c2117; --bad:#e0685a; --bad-ink:#2a1310;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--ink); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  svg.icon{width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; vertical-align:-3px;}
  header{padding:1.1rem 1.5rem; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; position:relative;}
  header::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:3px; background:repeating-linear-gradient(90deg, var(--teal) 0 6px, transparent 6px 14px); opacity:.35;}
  header h1{font-family:"Barlow Condensed",sans-serif; font-size:1.35rem; margin:0; text-transform:uppercase; letter-spacing:.02em; display:flex; align-items:center; gap:.6rem;}
  .brand-mark{width:30px; height:30px; border-radius:7px; background:var(--teal-ink); border:1px solid var(--teal-dim); display:flex; align-items:center; justify-content:center; color:var(--teal); flex-shrink:0;}
  header a{color:var(--text-dim); font-size:.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:.4rem;}
  header a:hover{color:var(--teal);}
  .wrap{max-width:940px; margin:0 auto; padding:1.4rem 1.5rem 3rem;}
  h2{
    font-family:"Barlow Condensed",sans-serif; font-weight:700; font-size:1.1rem; text-transform:uppercase;
    letter-spacing:.04em; color:var(--text); margin:2.2rem 0 .8rem; display:flex; align-items:center; gap:.5rem;
  }
  h2 svg{color:var(--teal);}
  table{width:100%; border-collapse:collapse; font-size:.88rem; margin-bottom:1rem;}
  th{
    text-align:left; padding:.55rem .6rem; border-bottom:1px solid var(--line); color:var(--text-dim);
    font-family:"Barlow Condensed",sans-serif; font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em;
  }
  td{padding:.5rem .6rem; border-bottom:1px solid #1c232b;}
  input, select{padding:.5rem .6rem; background:var(--panel); border:1px solid var(--line); border-radius:5px; color:var(--text); font-size:.85rem;}
  input:focus, select:focus{outline:none; border-color:var(--teal);}
  button{
    padding:.5rem .85rem; border-radius:5px; border:1px solid var(--line-bright); background:var(--panel-2);
    color:var(--text); font-size:.84rem; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem;
  }
  button.primary{background:var(--teal); color:#062521; border:none; font-weight:700;}
  button.danger{color:var(--bad); border-color:#5a2a20;}
  .add-form{display:flex; gap:.5rem; flex-wrap:wrap; align-items:end; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:1rem;}
  .add-form .field{display:flex; flex-direction:column; gap:.3rem;}
  .add-form label{font-family:"Barlow Condensed",sans-serif; font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
  .pill{display:inline-flex; align-items:center; gap:.3rem; padding:.15rem .55rem; border-radius:20px; font-size:.72rem; font-weight:700;}
  .pill.active{background:var(--good-ink); color:var(--good);} .pill.inactive{background:var(--bad-ink); color:var(--bad);}
  .msg{font-size:.85rem; margin-top:.6rem; min-height:1em; display:flex; align-items:center; gap:.4rem;}
  .msg.err{color:var(--bad);} .msg.ok{color:var(--good);}
  .denied{text-align:center; padding:4rem; color:var(--text-dim); display:flex; flex-direction:column; align-items:center; gap:.7rem;}
</style>
</head>
<body>
<header>
  <h1>
    <span class="brand-mark"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    Admin
  </h1>
  <div style="display:flex; gap:.8rem; align-items:center;">
    <a href="/dashboard.html"><svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>Back to dashboard</a>
    <button id="logoutBtn">
      <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      Log Out
    </button>
  </div>
</header>
<div class="wrap" id="app">

  <h2><svg class="icon" viewBox="0 0 24 24"><path d="M4 19h16M6 19V9l4-4 4 4v10M14 19v-6h4v6"/><circle cx="8" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg>Machines</h2>
  <table id="machinesTable">
    <thead><tr><th>No.</th><th>Line</th><th>Brand</th><th>Status</th><th colspan="3"></th></tr></thead>
    <tbody id="machinesBody"></tbody>
  </table>
  <div class="add-form">
    <div class="field"><label>Machine No.</label><input id="newMachineNo" placeholder="M-22"></div>
    <div class="field"><label>Line</label><input id="newMachineLine" placeholder="Line 5"></div>
    <div class="field"><label>Brand</label>
      <select id="newMachineType"><option value="Ishida">Ishida</option><option value="Yamato">Yamato</option></select>
    </div>
    <button class="primary" id="addMachineBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add Machine</button>
  </div>
  <div class="msg" id="machineMsg"></div>

  <h2><svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Shift Incharges / Users</h2>
  <table id="usersTable">
    <thead><tr><th>Name</th><th>Role</th><th>Status</th><th colspan="3"></th></tr></thead>
    <tbody id="usersBody"></tbody>
  </table>
  <div class="add-form">
    <div class="field"><label>Name</label><input id="newUserName" placeholder="Full name"></div>
    <div class="field"><label>PIN</label><input id="newUserPin" placeholder="4-digit" maxlength="6"></div>
    <div class="field"><label>Role</label>
      <select id="newUserRole"><option value="incharge">Incharge</option><option value="admin">Admin</option></select>
    </div>
    <button class="primary" id="addUserBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add User</button>
  </div>
  <div class="msg" id="userMsg"></div>

</div>

<script>
const API = "";
const token = localStorage.getItem("mdt_token");
const role = localStorage.getItem("mdt_role");

const ICONS = {
  check: '<svg class="icon" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>',
  x: '<svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  lock: '<svg width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
};

if(!token || role !== "admin"){
  document.getElementById("app").innerHTML =
    `<div class="denied">${ICONS.lock}Admin access required.<br>Log in as an admin user from the main app first.</div>`;
  throw new Error("not admin");
}
const authHeaders = { "content-type":"application/json", authorization:"Bearer "+token };

async function loadMachines(){
  const res = await fetch(API+"/api/admin/machines", { headers: authHeaders });
  const machines = await res.json();
  const body = document.getElementById("machinesBody");
  body.innerHTML = "";
  machines.forEach(m=>{
    const tr = document.createElement("tr");
    tr.dataset.id = m.id;
    renderMachineRow(tr, m);
    body.appendChild(tr);
  });
}

function renderMachineRow(tr, m){
  tr.innerHTML = `
    <td>${m.machine_no}</td>
    <td>${m.line_name || "—"}</td>
    <td>${m.machine_type}</td>
    <td><span class="pill ${m.active ? "active":"inactive"}">${m.active ? ICONS.check+"Active":ICONS.x+"Inactive"}</span></td>
    <td><button data-id="${m.id}" class="editMachine"><svg class="icon" viewBox="0 0 24 24"><path d="M11 4H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2v-6"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Edit</button></td>
    <td><button data-id="${m.id}" data-active="${m.active}" class="toggleMachine">${m.active ? "Deactivate":"Activate"}</button></td>
    <td><button data-id="${m.id}" class="deleteMachine danger"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>Delete</button></td>
  `;
  tr.querySelector(".editMachine").onclick = ()=> renderMachineEditRow(tr, m);
  tr.querySelector(".toggleMachine").onclick = async ()=>{
    await fetch(API+"/api/admin/machines/"+m.id, { method:"PATCH", headers: authHeaders, body: JSON.stringify({ active: m.active ? 0 : 1 }) });
    loadMachines();
  };
  tr.querySelector(".deleteMachine").onclick = async ()=>{
    if(!confirm("Delete this machine permanently? Past readings from it are kept, but it will disappear from the incharge app's dropdown and this admin list.")) return;
    await fetch(API+"/api/admin/machines/"+m.id, { method:"DELETE", headers: authHeaders });
    loadMachines();
  };
}

function renderMachineEditRow(tr, m){
  tr.innerHTML = `
    <td><input type="text" class="editNo" value="${m.machine_no}" style="width:80px;"></td>
    <td><input type="text" class="editLine" value="${m.line_name || ""}" style="width:100px;"></td>
    <td><select class="editType"><option value="Ishida" ${m.machine_type==="Ishida"?"selected":""}>Ishida</option><option value="Yamato" ${m.machine_type==="Yamato"?"selected":""}>Yamato</option></select></td>
    <td colspan="2"><button class="saveMachine primary">${ICONS.check}Save</button></td>
    <td><button class="cancelMachine">Cancel</button></td>
  `;
  tr.querySelector(".saveMachine").onclick = async ()=>{
    const machine_no = tr.querySelector(".editNo").value.trim();
    const line_name = tr.querySelector(".editLine").value.trim();
    const machine_type = tr.querySelector(".editType").value;
    if(!machine_no){ alert("Machine number can't be empty."); return; }
    const res = await fetch(API+"/api/admin/machines/"+m.id, { method:"PATCH", headers: authHeaders,
      body: JSON.stringify({ machine_no, line_name, machine_type }) });
    if(!res.ok){ const d = await res.json(); alert(d.error || "Could not save."); return; }
    loadMachines();
  };
  tr.querySelector(".cancelMachine").onclick = ()=> loadMachines();
}

document.getElementById("addMachineBtn").onclick = async ()=>{
  const machine_no = document.getElementById("newMachineNo").value.trim();
  const line_name = document.getElementById("newMachineLine").value.trim();
  const machine_type = document.getElementById("newMachineType").value;
  const msg = document.getElementById("machineMsg");
  if(!machine_no){ msg.textContent = "Enter a machine number."; msg.className = "msg err"; return; }
  const res = await fetch(API+"/api/admin/machines", { method:"POST", headers: authHeaders,
    body: JSON.stringify({ machine_no, line_name, machine_type }) });
  const data = await res.json();
  if(!res.ok){ msg.textContent = data.error; msg.className = "msg err"; return; }
  msg.innerHTML = ICONS.check + "Machine added."; msg.className = "msg ok";
  document.getElementById("newMachineNo").value = ""; document.getElementById("newMachineLine").value = "";
  loadMachines();
};

async function loadUsers(){
  const res = await fetch(API+"/api/admin/users", { headers: authHeaders });
  const users = await res.json();
  const body = document.getElementById("usersBody");
  body.innerHTML = "";
  users.forEach(u=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.name}</td>
      <td>${u.role}</td>
      <td><span class="pill ${u.active ? "active":"inactive"}">${u.active ? ICONS.check+"Active":ICONS.x+"Inactive"}</span></td>
      <td><button data-id="${u.id}" data-active="${u.active}" class="toggleUser">${u.active ? "Deactivate":"Activate"}</button></td>
      <td><button data-id="${u.id}" data-name="${u.name}" class="resetPin"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Reset PIN</button></td>
      <td><button data-id="${u.id}" data-name="${u.name}" class="deleteUser danger"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>Delete</button></td>
    `;
    body.appendChild(tr);
  });
  document.querySelectorAll(".toggleUser").forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id, active = btn.dataset.active === "1" ? 0 : 1;
      await fetch(API+"/api/admin/users/"+id, { method:"PATCH", headers: authHeaders, body: JSON.stringify({ active }) });
      loadUsers();
    };
  });
  document.querySelectorAll(".resetPin").forEach(btn=>{
    btn.onclick = async ()=>{
      const newPin = prompt("New PIN for " + btn.dataset.name + ":");
      if(!newPin) return;
      await fetch(API+"/api/admin/users/"+btn.dataset.id, { method:"PATCH", headers: authHeaders, body: JSON.stringify({ pin: newPin }) });
      alert("PIN updated for " + btn.dataset.name);
    };
  });
  document.querySelectorAll(".deleteUser").forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm("Delete " + btn.dataset.name + " permanently? Their past readings stay on record, but they'll no longer be able to log in.")) return;
      await fetch(API+"/api/admin/users/"+btn.dataset.id, { method:"DELETE", headers: authHeaders });
      loadUsers();
    };
  });
}

document.getElementById("addUserBtn").onclick = async ()=>{
  const name = document.getElementById("newUserName").value.trim();
  const pin = document.getElementById("newUserPin").value.trim();
  const roleVal = document.getElementById("newUserRole").value;
  const msg = document.getElementById("userMsg");
  if(!name || !pin){ msg.textContent = "Enter a name and PIN."; msg.className = "msg err"; return; }
  const res = await fetch(API+"/api/admin/users", { method:"POST", headers: authHeaders,
    body: JSON.stringify({ name, pin, role: roleVal }) });
  const data = await res.json();
  if(!res.ok){ msg.textContent = data.error; msg.className = "msg err"; return; }
  msg.innerHTML = ICONS.check + "User added."; msg.className = "msg ok";
  document.getElementById("newUserName").value = ""; document.getElementById("newUserPin").value = "";
  loadUsers();
};

loadMachines();
loadUsers();
document.getElementById("logoutBtn").onclick = ()=>{
  localStorage.removeItem("mdt_token");
  localStorage.removeItem("mdt_name");
  localStorage.removeItem("mdt_role");
  window.location.href = "/index.html";
};
</script>
</body>
</html>
